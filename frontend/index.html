<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Water Forecasting System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>💧 Water Consumption Forecasting System</h1>

    <!-- INPUT SECTION -->
    <div class="card">
        <h2>Input Monthly Data</h2>

        <textarea id="inputData" placeholder='
Example:
[
 {"Year":2025,"Month":1},
 {"Year":2025,"Month":2},
 {"Year":2025,"Month":3}
]'></textarea>

        <button onclick="getForecast()">Generate Forecast</button>
    </div>

    <!-- RESULT SECTION -->
    <div class="card">
        <h2>Forecast Result</h2>
        <canvas id="chart"></canvas>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
