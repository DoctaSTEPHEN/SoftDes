<!DOCTYPE html>
<html>
<head>
    <title>Water System</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>💧 Water Monitoring System (MongoDB + Auto AI)</h1>

<!-- ========================= -->
<!-- ADD RECORD -->
<!-- ========================= -->
<div class="card">
    <h3>Add Record</h3>

    <input id="year" placeholder="Year">
    <input id="month" placeholder="Month">
    <input id="consumption" placeholder="Consumption">
    <input id="bill" placeholder="Bill">

    <button onclick="addRecord()">Add Record</button>
</div>

<!-- ========================= -->
<!-- UPLOAD -->
<!-- ========================= -->
<div class="card">
    <h3>Upload CSV / JSON</h3>

    <input type="file" id="file">
    <button onclick="uploadFile()">Upload File</button>
</div>

<!-- ========================= -->
<!-- DASHBOARD -->
<!-- ========================= -->
<div class="card">
    <h3>Dashboard</h3>
    <p>Total: <span id="total"></span></p>
    <p>Avg: <span id="avg"></span></p>
    <p>Bill: <span id="bill_total"></span></p>
</div>

<!-- ========================= -->
<!-- FORECAST (AUTO DISPLAY ONLY) -->
<!-- ========================= -->
<div class="card">
    <h3>Forecast (Auto Generated)</h3>
    <div id="forecast">Loading...</div>
</div>

<!-- ========================= -->
<!-- VISUALIZATION (AUTO CHART) -->
<!-- ========================= -->
<div class="card">
    <h3>Visualization (Auto Chart)</h3>
    <canvas id="chart"></canvas>
</div>

<!-- ========================= -->
<!-- ANOMALY -->
<!-- ========================= -->
<div class="card">
    <h3>Anomaly Detection</h3>
    <div id="anomaly"></div>
</div>

<!-- ========================= -->
<!-- SCRIPT -->
<!-- ========================= -->
<script src="/static/scripts.js"></script>

</body>
</html>
