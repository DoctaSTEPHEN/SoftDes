<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AquaForecast</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://kit.fontawesome.com/a2e0e6ad1a.js" crossorigin="anonymous"></script>

<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<aside class="sidebar">

    <div class="logo-box">
        <div class="logo-circle">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRdUY6-53NESEHhJDAyfXsJigOm9_okUAsgjw&s">
        </div>

        <h2>AquaForecast</h2>
        <p>Water Monitoring</p>
    </div>

    <div class="menu-item active" onclick="showPage('dashboard', this)">Dashboard</div>
    <div class="menu-item" onclick="showPage('record', this)">Records</div>
    <div class="menu-item" onclick="showPage('reports', this)">Reports</div>

</aside>

<!-- MAIN -->
<div class="main">

<div class="topbar" id="title">Dashboard</div>

<!-- DASHBOARD -->
<div class="page active" id="dashboard">

    <div class="card chart-box">
        <canvas id="chart"></canvas>
    </div>

    <div class="grid">
        <div class="card">Total: <span id="total"></span></div>
        <div class="card">Avg Consumption: <span id="avg"></span></div>
        <div class="card">Avg Bill: <span id="bill_total"></span></div>
    </div>

    <div class="card">
        <h3>Forecast</h3>
        <div id="forecast"></div>
    </div>

    <div class="card">
        <h3>Anomalies</h3>
        <div id="anomaly"></div>
    </div>

    <div class="card maintenance-card">
        <h3>Maintenance</h3>

        <input type="date" id="maintenanceDate">

        <button class="btn" onclick="openMaintenanceCalendar()">Pick Date</button>
        <button class="btn" onclick="setMaintenance()">Set</button>

        <p id="nextMaintenance"></p>
    </div>

</div>

<!-- RECORDS -->
<div class="page" id="record">

    <div class="card">
        <h3>Add Record</h3>

        <div class="grid">
            <input id="year" placeholder="Year">
            <input id="month" placeholder="Month">
            <input id="consumption" placeholder="Consumption">
            <input id="bill" placeholder="Bill">
        </div>

        <button class="btn" onclick="addRecord()">Add</button>
    </div>

    <div class="card">
        <h3>Upload CSV</h3>
        <input type="file" id="file">
        <button class="btn" onclick="uploadFile()">Upload</button>
    </div>

    <div class="card">
        <button class="btn-danger" onclick="resetData()">Reset All</button>
    </div>

</div>

<!-- REPORTS -->
<div class="page" id="reports">

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Year</th>
                    <th>Month</th>
                    <th>Consumption</th>
                    <th>Bill</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="reportTable"></tbody>
        </table>
    </div>

</div>

</div>
</div>

<!-- POPUPS -->

<div id="anomalyPopup" class="popup">
    <div class="popup-box anomaly">
        <h3>⚠ Anomaly</h3>
        <div id="anomalyPopupBody"></div>
        <button onclick="closeAnomalyPopup()">Close</button>
    </div>
</div>

<div id="maintenancePopup" class="popup">
    <div class="popup-box maintenance">
        <h3 id="popupTitle">Maintenance</h3>
        <p id="popupText"></p>
        <button onclick="closeMaintenancePopup()">Close</button>
    </div>
</div>

<script src="/static/scripts.js"></script>

</body>
</html>
