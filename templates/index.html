<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Water Monitoring System</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>💧 Water System</h2>

        <button onclick="showPage('dashboard')">Dashboard</button>
        <button onclick="showPage('record')">Record Data</button>
        <button onclick="showPage('visualize')">Charts</button>
        <button onclick="showPage('reports')">Reports</button>
    </div>

    <!-- MAIN CONTENT -->
    <div class="content">

        <!-- DASHBOARD -->
        <div id="dashboard" class="page">
            <h1>Dashboard</h1>

            <div class="cards">
                <div class="card">
                    <h3>Total Usage</h3>
                    <p id="total_usage">0</p>
                </div>

                <div class="card">
                    <h3>Average Usage</h3>
                    <p id="avg_usage">0</p>
                </div>

                <div class="card">
                    <h3>Total Bill</h3>
                    <p id="total_bill">0</p>
                </div>
            </div>
        </div>

        <!-- RECORD -->
        <div id="record" class="page hidden">
            <h1>Add Record</h1>

            <input id="year" type="number" placeholder="Year">
            <input id="month" type="number" placeholder="Month">
            <input id="consumption" type="number" placeholder="Consumption">
            <input id="bill" type="number" placeholder="Bill">
            <input id="branch" type="text" placeholder="Branch">

            <button onclick="addRecord()">Submit</button>

            <hr>

            <input type="file" id="file">
            <button onclick="uploadFile()">Upload CSV</button>
        </div>

        <!-- VISUALIZATION -->
        <div id="visualize" class="page hidden">
            <h1>Consumption Chart</h1>
            <canvas id="chart"></canvas>
        </div>

        <!-- REPORTS -->
        <div id="reports" class="page hidden">
            <h1>Reports</h1>

            <table>
                <thead>
                    <tr>
                        <th>Month</th>
                        <th>Consumption</th>
                        <th>Bill</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="reportTable"></tbody>
            </table>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
