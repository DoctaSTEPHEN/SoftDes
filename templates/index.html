<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water System Dashboard</title>

<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<aside class="sidebar">

    <div class="logo-box">
    
    <div class="logo-circle">
        <img 
        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRdUY6-53NESEHhJDAyfXsJigOm9_okUAsgjw&s"
        alt="Logo">
    </div>

    <h2>AquaForecast</h2>
    <p>Water Monitoring</p>

 </div>

    <div class="menu-item active" onclick="showPage('dashboard',this)">
        <i class="fa-solid fa-chart-line"></i>
        <span>Dashboard</span>
    </div>

    <div class="menu-item" onclick="showPage('record',this)">
        <i class="fa-solid fa-plus"></i>
        <span>Add Data</span>
    </div>

    <div class="menu-item" onclick="showPage('reports',this)">
        <i class="fa-solid fa-table"></i>
        <span>Records</span>
    </div>

</aside>

<!-- MAIN -->
<main class="main">

<div class="topbar" id="title">Dashboard</div>

<!-- DASHBOARD -->
<section class="page active" id="dashboard">

    <div class="card chart-box">
        <canvas id="chart"></canvas>
    </div>

    <div class="stats-grid">
        <div class="card stat-card">
            <h4>Total Usage</h4>
            <h2 id="total">0</h2>
        </div>

        <div class="card stat-card">
            <h4>Average</h4>
            <h2 id="avg">0</h2>
        </div>

        <div class="card stat-card">
            <h4>Total Bill</h4>
            <h2 id="bill_total">0</h2>
        </div>
    </div>

    <div class="card">
        <h3>Forecast</h3>
        <div id="forecast"></div>
    </div>

    <div class="card">
        <h3>Anomalies</h3>
        <div id="anomaly"></div>
    </div>

</section>

<!-- RECORD -->
<section class="page" id="record">

    <div class="card">
        <h3><i class="fa-solid fa-upload"></i> Upload File</h3>
        <input type="file" id="file">
        <button class="btn" onclick="uploadFile()">Upload</button>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-plus"></i> Add Record</h3>

        <div class="grid">
            <input id="year" placeholder="Year">

            <select id="month">
                <option value="1">Jan</option>
                <option value="2">Feb</option>
                <option value="3">Mar</option>
                <option value="4">Apr</option>
                <option value="5">May</option>
                <option value="6">Jun</option>
                <option value="7">Jul</option>
                <option value="8">Aug</option>
                <option value="9">Sep</option>
                <option value="10">Oct</option>
                <option value="11">Nov</option>
                <option value="12">Dec</option>
            </select>

            <input id="consumption" placeholder="Consumption">
            <input id="bill" placeholder="Bill">
        </div>

        <button class="btn" onclick="addRecord()">Add Record</button>
    </div>
</section>


<!-- REPORTS -->
<section class="page" id="reports">

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Year</th>
                    <th>Month</th>
                    <th>Usage</th>
                    <th>Bill</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="reportTable"></tbody>
        </table>
    </div>
  
    <div class="card">
        <h3><i class="fa-solid fa-trash"></i> Reset All Data</h3>
        <button class="btn-danger" onclick="resetData()">Reset Records</button>
    </div>

</section>

</main>
</div>

<script src="/static/scripts.js"></script>
</body>
</html>
