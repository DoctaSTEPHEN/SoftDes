<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Water System App</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Inter, sans-serif;
    background: #F8F8F8;
}

/* =========================
   LAYOUT
========================= */
.container {
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 20px;
    padding: 20px;
    height: 100vh;
}

/* =========================
   SIDEBAR
========================= */
.sidebar {
    background: white;
    border-radius: 20px;
    padding: 20px;
}

.menu-item {
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
}

.menu-item.active {
    background: #4CA9AF;
    color: white;
}

/* =========================
   MAIN
========================= */
.main {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.topbar {
    background: white;
    padding: 20px;
    border-radius: 20px;
    font-size: 24px;
    font-weight: bold;
}

/* =========================
   PAGES
========================= */
.page {
    display: none;
    flex-direction: column;
    gap: 20px;
}

.page.active {
    display: flex;
}

/* =========================
   CARDS
========================= */
.card-box {
    background: white;
    padding: 20px;
    border-radius: 20px;
}

/* =========================
   INPUTS
========================= */
input, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ddd;
    height: 38px;
    box-sizing: border-box;
}

/* =========================
   BUTTONS
========================= */
.btn-add {
    background: #238086;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 8px;
    margin-top: 10px;
    cursor: pointer;
}

.btn-reset {
    background: #e74c3c;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* =========================
   GRID
========================= */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

/* =========================
   TABLE
========================= */
table {
    width: 100%;
    background: white;
    border-radius: 20px;
    overflow: hidden;
}

th, td {
    padding: 10px;
    text-align: left;
    border-bottom: 1px solid #eee;
}

/* =========================
   CHART
========================= */
.graph-box {
    background: white;
    padding: 20px;
    border-radius: 20px;
    height: 350px;
}

/* =========================
   SMALL TEXT
========================= */
.box {
    background: white;
    padding: 15px;
    border-radius: 15px;
}
</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="menu-item active" onclick="show('dashboard', this)">Dashboard</div>
    <div class="menu-item" onclick="show('record', this)">Record</div>
    <div class="menu-item" onclick="show('reports', this)">Reports</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar" id="title">Dashboard</div>

<!-- ================= DASHBOARD ================= -->
<div class="page active" id="dashboard">

    <div class="graph-box">
        <canvas id="chart"></canvas>
    </div>

    <div class="box">
        <b>Total:</b> <span id="total"></span>
    </div>

    <div class="box">
        <b>Average:</b> <span id="avg"></span>
    </div>

    <div class="box">
        <b>Total Bill:</b> <span id="bill_total"></span>
    </div>

    <div class="box">
        <h3>Forecast (Bill)</h3>
        <div id="forecast"></div>
    </div>

    <div class="box">
        <h3>Anomalies</h3>
        <div id="anomaly"></div>
    </div>

</div>

<!-- ================= RECORD ================= -->
<div class="page" id="record">

    <!-- UPLOAD -->
    <div class="card-box">
        <h3>Upload File</h3>
        <input type="file" id="file">
        <button class="btn-add" onclick="uploadFile()">Upload</button>
    </div>

    <!-- ADD -->
    <div class="card-box">
        <h3>Add Record</h3>

        <div class="grid">
            <input id="year" placeholder="Year">

            <select id="month">
                <option value="1">January</option>
                <option value="2">February</option>
                <option value="3">March</option>
                <option value="4">April</option>
                <option value="5">May</option>
                <option value="6">June</option>
                <option value="7">July</option>
                <option value="8">August</option>
                <option value="9">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
            </select>

            <input id="consumption" placeholder="Consumption">
            <input id="bill" placeholder="Bill">
        </div>

        <button class="btn-add" onclick="addRecord()">Add Record</button>
    </div>

    <!-- RESET -->
    <div class="card-box">
        <h3>Danger Zone</h3>
        <button class="btn-reset" onclick="resetData()">Reset All Data</button>
    </div>

</div>

<!-- ================= REPORTS ================= -->
<div class="page" id="reports">

    <div class="card-box">
        <table>
            <thead>
                <tr>
                    <th>Year</th>
                    <th>Month</th>
                    <th>Usage</th>
                    <th>Bill</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="reportTable"></tbody>
        </table>
    </div>

</div>

</div>
</div>

<script src="/static/scripts.js"></script>

<script>
const titles = {
    dashboard: "Dashboard",
    record: "Record",
    reports: "Reports"
};

function show(page, el) {
    document.querySelectorAll(".menu-item").forEach(m => m.classList.remove("active"));
    el.classList.add("active");

    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(page).classList.add("active");

    document.getElementById("title").innerText = titles[page];
}
</script>

</body>
</html>
