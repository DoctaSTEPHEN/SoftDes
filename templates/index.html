<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Water System Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Inter, sans-serif;
    background: #F8F8F8;
}

/* ===================== LAYOUT ===================== */
.container {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 20px;
    padding: 20px;
    height: 100vh;
}

/* ===================== SIDEBAR ===================== */
.sidebar {
    background: #fff;
    border-radius: 20px;
    padding: 20px;
}

.menu-item {
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
    margin-bottom: 8px;
}

.menu-item.active {
    background: #4CA9AF;
    color: white;
}

/* ===================== MAIN ===================== */
.main {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.topbar {
    background: #fff;
    padding: 18px;
    border-radius: 15px;
    font-size: 22px;
    font-weight: bold;
}

/* ===================== PAGE ===================== */
.page {
    display: none;
    flex-direction: column;
    gap: 20px;
}

.page.active {
    display: flex;
}

/* ===================== CARDS ===================== */
.card {
    background: #fff;
    padding: 20px;
    border-radius: 15px;
}

/* ===================== INPUTS ===================== */
input, select {
    width: 100%;
    height: 38px;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #ddd;
    box-sizing: border-box;
}

/* ===================== BUTTONS ===================== */
button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

.btn {
    background: #238086;
    color: white;
}

.btn-danger {
    background: #e74c3c;
    color: white;
}

/* ===================== GRID ===================== */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

/* ===================== TABLE ===================== */
table {
    width: 100%;
    background: #fff;
    border-radius: 15px;
    overflow: hidden;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #eee;
}

/* ===================== CHART ===================== */
.chart-box {
    background: #fff;
    padding: 20px;
    border-radius: 15px;
    height: 350px;
}
</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="menu-item active" onclick="showPage('dashboard', this)">Dashboard</div>
    <div class="menu-item" onclick="showPage('record', this)">Record</div>
    <div class="menu-item" onclick="showPage('reports', this)">Reports</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar" id="title">Dashboard</div>

<!-- ================= DASHBOARD ================= -->
<div class="page active" id="dashboard">

    <div class="chart-box">
        <canvas id="chart"></canvas>
    </div>

    <div class="card">
        <b>Total:</b> <span id="total"></span>
    </div>

    <div class="card">
        <b>Average:</b> <span id="avg"></span>
    </div>

    <div class="card">
        <b>Total Bill:</b> <span id="bill_total"></span>
    </div>

    <div class="card">
        <h3>Forecast (Bill)</h3>
        <div id="forecast"></div>
    </div>

    <div class="card">
        <h3>Anomalies</h3>
        <div id="anomaly"></div>
    </div>
    <div class="card" id="maintenanceAlert" style="display:none; background:#fff3cd; border-left:5px solid #ff9800;">
     <b>Maintenance Alert:</b> Today is scheduled maintenance day!
    </div>
    <div class="card">
        <h3>Maintenance Checker</h3>

        <input type="date" id="maintenanceDate">
        <button class="btn" onclick="checkMaintenance()">Check Next Maintenance</button>

        <div id="maintenanceResult"></div>
    </div>

</div>

<!-- ================= RECORD ================= -->
<div class="page" id="record">

    <div class="card">
        <h3>Upload File</h3>
        <input type="file" id="file">
        <button class="btn" onclick="uploadFile()">Upload</button>
    </div>

    <div class="card">
        <h3>Add Record</h3>

        <div class="grid">
            <input id="year" placeholder="Year">

            <select id="month">
                <option value="1">Jan</option>
                <option value="2">Feb</option>
                <option value="3">Mar</option>
                <option value="4">Apr</option>
                <option value="5">May</option>
                <option value="6">Jun</option>
                <option value="7">Jul</option>
                <option value="8">Aug</option>
                <option value="9">Sep</option>
                <option value="10">Oct</option>
                <option value="11">Nov</option>
                <option value="12">Dec</option>
            </select>

            <input id="consumption" placeholder="Consumption">
            <input id="bill" placeholder="Bill">
        </div>

        <button class="btn" onclick="addRecord()">Add Record</button>
    </div>

    <div class="card">
        <h3>Danger Zone</h3>
        <button class="btn-danger" onclick="resetData()">Reset All Data</button>
    </div>

</div>

<!-- ================= REPORTS ================= -->
<div class="page" id="reports">

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Year</th>
                    <th>Month</th>
                    <th>Usage</th>
                    <th>Bill</th>
                </tr>
            </thead>
            <tbody id="reportTable"></tbody>
        </table>
    </div>

</div>

</div>
</div>

<script src="/static/scripts.js"></script>

<script>
function showPage(page, el) {
    document.querySelectorAll(".menu-item").forEach(m => m.classList.remove("active"));
    el.classList.add("active");

    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(page).classList.add("active");

    document.getElementById("title").innerText =
        page.charAt(0).toUpperCase() + page.slice(1);
}
</script>

</body>
</html>
